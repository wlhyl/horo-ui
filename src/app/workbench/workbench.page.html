<div class="workbench-container">
  <div class="workbench-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <button
        class="panel-toggle-btn"
        (click)="toggleSidebar()"
        [class.active]="!sidebarCollapsed"
        title="显示/隐藏输入面板"
      >
        <ion-icon [name]="sidebarCollapsed ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        <span>面板</span>
      </button>
      <div class="window-list-wrapper" #windowListWrapper>
        @if (windowCount > 0) {
          <button class="window-list-btn" (click)="toggleWindowList($event)">
            <ion-icon name="layers-outline"></ion-icon>
            <span>{{ windowCount }} 个窗口</span>
            <ion-icon name="chevron-down-outline"></ion-icon>
          </button>
        }
        @if (windowListOpen) {
          <div class="window-list-dropdown">
            <div class="window-list-header">
              <span>窗口列表</span>
              <button class="list-close" (click)="closeWindowList()">
                <ion-icon name="close-outline"></ion-icon>
              </button>
            </div>
            <div class="window-list-items">
              @for (win of allWindows; track win.id) {
                <div
                  class="window-list-item"
                  [class.active]="win.id === topWindowId"
                  (click)="onSwitchWindow(win.id)"
                  [title]="win.title"
                >
                  <ion-icon [name]="stateIcon(win.state)"></ion-icon>
                  <span class="item-title">{{ win.title }}</span>
                  @if (win.state !== 'normal') {
                    <span class="item-state">{{ stateLabel(win.state) }}</span>
                  }
                  <button class="item-close" (click)="onListClose(win.id, $event)">
                    <ion-icon name="close-outline"></ion-icon>
                  </button>
                </div>
              }
            </div>
          </div>
        }
      </div>
    </ion-buttons>
  </div>

  <div
    class="workbench-body"
    [style.height.px]="workareaHeight"
    [class.flex-fill]="workareaHeight === null"
  >
    <div
      class="sidebar"
      [class.collapsed]="sidebarCollapsed"
      [style.width.px]="sidebarCollapsed ? null : sidebarWidth"
    >
      <app-input-panel
        [style.display]="sidebarCollapsed ? 'none' : null"
        [horoData]="horoData"
        [eventData]="eventData"
        [processData]="processData"
        (horoDataChange)="onHoroDataChange($event)"
        (eventDataChange)="onEventDataChange($event)"
        (processDataChange)="onProcessDataChange($event)"
        (openChart)="onOpenChart($event)"
      ></app-input-panel>
      <div class="sidebar-resize-handle" (mousedown)="onSidebarResizeStart($event)"></div>
      <button class="sidebar-toggle" (click)="toggleSidebar()">
        <ion-icon [name]="sidebarCollapsed ? 'chevron-forward' : 'chevron-back'"></ion-icon>
      </button>
    </div>

    <div class="work-area" #workAreaEl>
      @if (windowCount === 0) {
        <div class="empty-state">
          <ion-icon name="apps-outline"></ion-icon>
          <p>从左侧面板选择星盘类型添加到工作台</p>
        </div>
      }
      <app-window-manager
        [horoData]="horoData"
        [eventData]="eventData"
        [processData]="processData"
        [workArea]="workArea"
      ></app-window-manager>
    </div>
  </div>
  <div class="workarea-resize-handle" (mousedown)="onWorkareaResizeStart($event)">
    <span class="handle-grip"></span>
  </div>
</div>
