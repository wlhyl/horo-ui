<div class="window-manager">
  @for (win of visibleWindows; track win.id) {
    <app-window-frame
      [window]="win"
      [horoData]="horoData()"
      [eventData]="eventData()"
      [processData]="processData()"
      [workArea]="workArea()"
      (focus)="onFocus($event)"
      (close)="onClose($event)"
      (minimize)="onMinimize($event)"
      (hide)="onHide($event)"
      (toggleMaximize)="onToggleMaximize($event)"
      (updateRect)="onUpdateRect($event)"
    ></app-window-frame>
  }
</div>
